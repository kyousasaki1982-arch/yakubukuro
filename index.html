<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>誤薬防止システム</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    .app { max-width: 420px; margin: 0 auto; padding: 16px; }
    .header { text-align: center; padding: 16px 0; background: #185FA5; color: white; border-radius: 12px; margin-bottom: 16px; }
    .header h1 { font-size: 18px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #e0e0e0; border-radius: 8px; padding: 4px; }
    .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: #888; }
    .tab.active { background: white; color: #185FA5; font-weight: bold; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .timing-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .tbtn { flex: 1; padding: 14px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; background: #f5f5f5; color: #888; }
    .tbtn.sel-朝 { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
    .tbtn.sel-昼 { background: #E6F1FB; color: #185FA5; border-color: #378ADD; }
    .tbtn.sel-夜 { background: #EEEDFE; color: #3C3489; border-color: #7F77DD; }
    .person-list { display: flex; flex-direction: column; gap: 8px; }
    .person-btn { width: 100%; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; background: white; color: #333; text-align: left; }
    .person-btn:active { background: #f0f0f0; }
    .action-row { display: flex; gap: 10px; margin-top: 12px; }
    .ok-btn { flex: 1; padding: 18px; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; background: #3B6D11; color: white; }
    .ng-btn { flex: 1; padding: 18px; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; background: #A32D2D; color: white; }
    .result-card { background: #f0f0f0; border-radius: 12px; padding: 16px; margin-top: 12px; display: none; }
    .result-card.show { display: block; }
    .result-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
    .badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 16px; font-weight: bold; }
    .badge-朝 { background: #FAEEDA; color: #854F0B; }
    .badge-昼 { background: #E6F1FB; color: #185FA5; }
    .badge-夜 { background: #EEEDFE; color: #3C3489; }
    .log-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: white; border-radius: 8px; margin-bottom: 6px; }
    .log-item.ok { background: #EAF3DE; }
    .log-item.ng { background: #FCEBEB; }
    .empty { text-align: center; padding: 20px; color: #aaa; font-size: 14px; }
    .add-row { display: flex; gap: 8px; margin-top: 12px; }
    .add-inp { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 16px; }
    .add-btn { padding: 10px 16px; border-radius: 8px; font-size: 14px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .del-btn { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; padding: 4px 8px; }

    /* カメラ関連 */
    .cam-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
    .cam-wrap video { width: 100%; height: 100%; object-fit: cover; }
    .cam-frame { position: absolute; top: 25%; left: 10%; width: 80%; height: 30%; border: 3px solid rgba(255,255,255,0.8); border-radius: 8px; pointer-events: none; }
    .cam-status { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 6px; }
    .cam-start-btn { width: 100%; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; background: #185FA5; color: white; }
    .detected-banner { background: #EAF3DE; border: 2px solid #97C459; border-radius: 12px; padding: 14px; margin-bottom: 12px; display: none; text-align: center; }
    .detected-banner.show { display: block; }
    .detected-banner .dname { font-size: 22px; font-weight: bold; color: #3B6D11; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>💊 誤薬防止システム</h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('camera',this)">📷 カメラ</button>
    <button class="tab" onclick="switchTab('input',this)">✏️ 手動</button>
    <button class="tab" onclick="switchTab('members',this)">👥 入居者</button>
    <button class="tab" onclick="switchTab('log',this)">📋 記録</button>
  </div>

  <!-- カメラパネル -->
  <div id="panel-camera" class="panel active">
    <div class="card">
      <div class="label">服薬タイミングを選ぶ</div>
      <div class="timing-row">
        <button class="tbtn" id="cbtn-朝" onclick="selTCam('朝')">朝</button>
        <button class="tbtn" id="cbtn-昼" onclick="selTCam('昼')">昼</button>
        <button class="tbtn" id="cbtn-夜" onclick="selTCam('夜')">夜</button>
      </div>
    </div>

    <div class="cam-wrap" id="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="cam-frame"></div>
      <div class="cam-status" id="cam-status">薬袋の名前部分を枠内に入れてください</div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
    <button class="cam-start-btn" id="cam-start-btn" onclick="startCamera()">📷 カメラを起動する</button>

    <div class="detected-banner" id="detected-banner">
      <div class="dname" id="detected-name"></div>
      <div style="font-size:13px;color:#639922;margin-top:4px;">を読み取りました</div>
    </div>

    <div class="result-card" id="result-card-cam">
      <div class="result-name" id="res-name-cam"></div>
      <span class="badge" id="res-badge-cam"></span>
      <div class="action-row">
        <button class="ok-btn" onclick="saveRecordCam(true)">✓ 投薬した</button>
        <button class="ng-btn" onclick="saveRecordCam(false)">✗ 未投薬</button>
      </div>
    </div>
  </div>

  <!-- 手動入力パネル -->
  <div id="panel-input" class="panel">
    <div class="card">
      <div class="label">① 服薬タイミングを選ぶ</div>
      <div class="timing-row">
        <button class="tbtn" id="btn-朝" onclick="selT('朝')">朝</button>
        <button class="tbtn" id="btn-昼" onclick="selT('昼')">昼</button>
        <button class="tbtn" id="btn-夜" onclick="selT('夜')">夜</button>
      </div>
      <div class="label">② 入居者を選ぶ</div>
      <div class="person-list" id="person-list"></div>
    </div>

    <div class="result-card" id="result-card">
      <div class="result-name" id="res-name"></div>
      <span class="badge" id="res-badge"></span>
      <div class="action-row">
        <button class="ok-btn" onclick="saveRecord(true)">✓ 投薬した</button>
        <button class="ng-btn" onclick="saveRecord(false)">✗ 未投薬</button>
      </div>
    </div>
  </div>

  <!-- 入居者管理パネル -->
  <div id="panel-members" class="panel">
    <div class="card">
      <div class="label">入居者一覧</div>
      <div id="member-list"></div>
      <div class="add-row">
        <input class="add-inp" id="new-name" placeholder="名前を入力..." />
        <button class="add-btn" onclick="addMember()">追加</button>
      </div>
    </div>
  </div>

  <!-- 記録パネル -->
  <div id="panel-log" class="panel">
    <div id="log-list"><div class="empty">まだ記録がありません</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLKOfxq12B8McwKlNjnF-zxSYBy3_g0dQ",
    authDomain: "yakubukuro.firebaseapp.com",
    projectId: "yakubukuro",
    storageBucket: "yakubukuro.firebasestorage.app",
    messagingSenderId: "994315083600",
    appId: "1:994315083600:web:39c4655265d1e736d7d655"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let timing = '';
  let timingCam = '';
  let pendingName = '';
  let pendingNameCam = '';
  let membersCache = [];
  let lastDetectedName = '';
  let lastDetectedTime = 0;
  let ocrRunning = false;
  let ocrLoopActive = false;

  // タブ切り替え
  window.switchTab = function(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if(tab === 'log') loadLog();
    if(tab === 'members') loadMembers();
    if(tab === 'input') loadPersonList();
    if(tab !== 'camera') stopOcrLoop();
  }

  // ===== 手動入力 =====
  window.selT = function(t) {
    timing = t;
    ['朝','昼','夜'].forEach(x => {
      document.getElementById('btn-' + x).className = 'tbtn' + (x === t ? ' sel-' + x : '');
    });
  }

  async function loadPersonList() {
    const snap = await getDocs(collection(db, 'members'));
    membersCache = snap.docs.map(d => d.data().name);
    const list = document.getElementById('person-list');
    if(snap.empty) {
      list.innerHTML = '<p style="color:#aaa;font-size:13px;">👥 タブから入居者を登録してください</p>';
      return;
    }
    list.innerHTML = membersCache.map(name => `
      <button class="person-btn" onclick="selectPerson('${name}')">👤 ${name}</button>
    `).join('');
  }

  window.selectPerson = function(name) {
    if(!timing) { alert('先に朝・昼・夜を選んでください'); return; }
    pendingName = name;
    document.getElementById('res-name').textContent = name + ' さん';
    const badge = document.getElementById('res-badge');
    badge.textContent = timing + '薬';
    badge.className = 'badge badge-' + timing;
    document.getElementById('result-card').classList.add('show');
    speak(`${name}さん、${timing}の薬です。確認してください。`);
  }

  window.saveRecord = async function(ok) {
    await writeRecord(pendingName, timing, ok);
    document.getElementById('result-card').classList.remove('show');
  }

  // ===== カメラOCR =====
  window.selTCam = function(t) {
    timingCam = t;
    ['朝','昼','夜'].forEach(x => {
      document.getElementById('cbtn-' + x).className = 'tbtn' + (x === t ? ' sel-' + x : '');
    });
  }

  window.startCamera = async function() {
    if(!timingCam) { alert('先に朝・昼・夜を選んでください'); return; }
    try {
      // 入居者リストを読み込んでおく
      const snap = await getDocs(collection(db, 'members'));
      membersCache = snap.docs.map(d => d.data().name);
      if(membersCache.length === 0) {
        alert('入居者が登録されていません。「👥 入居者」タブで登録してください。');
        return;
      }

      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      document.getElementById('video').srcObject = stream;
      document.getElementById('cam-start-btn').style.display = 'none';
      document.getElementById('cam-status').textContent = '読み取り中...';
      startOcrLoop();
    } catch(e) {
      alert('カメラを起動できませんでした。カメラの権限を許可してください。');
    }
  }

  function startOcrLoop() {
    ocrLoopActive = true;
    ocrTick();
  }

  function stopOcrLoop() {
    ocrLoopActive = false;
  }

  async function ocrTick() {
    if(!ocrLoopActive) return;
    if(ocrRunning) { setTimeout(ocrTick, 300); return; }
    ocrRunning = true;
    try {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      if(video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const result = await Tesseract.recognize(canvas, 'jpn', { logger: () => {} });
        const text = result.data.text.replace(/\s/g, '');
        checkForMatch(text);
      }
    } catch(e) {
      console.error(e);
    }
    ocrRunning = false;
    if(ocrLoopActive) setTimeout(ocrTick, 800);
  }

  function checkForMatch(text) {
    const now = Date.now();
    for(const name of membersCache) {
      if(text.includes(name)) {
        // クールタイムチェック（同じ人を5秒以内に連続検知しない）
        if(name === lastDetectedName && (now - lastDetectedTime) < 5000) {
          return;
        }
        lastDetectedName = name;
        lastDetectedTime = now;
        onPersonDetected(name);
        return;
      }
    }
  }

  function onPersonDetected(name) {
    pendingNameCam = name;
    document.getElementById('detected-name').textContent = '👤 ' + name + ' さん';
    document.getElementById('detected-banner').classList.add('show');
    document.getElementById('res-name-cam').textContent = name + ' さん';
    const badge = document.getElementById('res-badge-cam');
    badge.textContent = timingCam + '薬';
    badge.className = 'badge badge-' + timingCam;
    document.getElementById('result-card-cam').classList.add('show');
    speak(`${name}さん、${timingCam}の薬です。確認してください。`);
  }

  window.saveRecordCam = async function(ok) {
    await writeRecord(pendingNameCam, timingCam, ok);
    document.getElementById('result-card-cam').classList.remove('show');
    document.getElementById('detected-banner').classList.remove('show');
  }

  // ===== 共通：記録保存・音声 =====
  async function writeRecord(name, tmg, ok) {
    const now = new Date();
    await addDoc(collection(db, 'records'), {
      name: name,
      timing: tmg,
      ok: ok,
      date: now.toLocaleDateString('ja-JP'),
      time: now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}),
      createdAt: now
    });
    speak(ok ? '投薬を記録しました。' : '未投薬として記録しました。');
  }

  function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }

  // ===== 入居者管理 =====
  async function loadMembers() {
    const snap = await getDocs(collection(db, 'members'));
    const list = document.getElementById('member-list');
    if(snap.empty) { list.innerHTML = '<div class="empty">まだ登録されていません</div>'; return; }
    list.innerHTML = snap.docs.map(d => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;">
        <span style="font-size:16px;">👤 ${d.data().name}</span>
        <button class="del-btn" onclick="deleteMember('${d.id}')">削除</button>
      </div>
    `).join('');
  }

  window.addMember = async function() {
    const inp = document.getElementById('new-name');
    const name = inp.value.trim();
    if(!name) { alert('名前を入力してください'); return; }
    await addDoc(collection(db, 'members'), { name });
    inp.value = '';
    loadMembers();
  }

  window.deleteMember = async function(id) {
    if(!confirm('削除しますか？')) return;
    await deleteDoc(doc(db, 'members', id));
    loadMembers();
  }

  // ===== 記録一覧 =====
  async function loadLog() {
    const q = query(collection(db, 'records'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    const el = document.getElementById('log-list');
    if(snap.empty) { el.innerHTML = '<div class="empty">まだ記録がありません</div>'; return; }
    el.innerHTML = snap.docs.map(d => {
      const r = d.data();
      return `<div class="log-item ${r.ok ? 'ok' : 'ng'}">
        <div>
          <div style="font-size:16px;font-weight:bold;">${r.name}</div>
          <div style="font-size:12px;color:#888;">${r.date} ${r.timing}薬 ${r.time}</div>
        </div>
        <span style="font-size:22px;">${r.ok ? '✓' : '✗'}</span>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
